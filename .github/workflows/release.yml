name: release

# Builds, signs, notarizes, and publishes the macOS app to a GitHub Release on
# THIS (public) repo. electron-updater in the shipped app polls that release's
# latest-mac.yml (publish target: package.json build.publish → github). Once
# assets land, running apps on a lower version show the in-app UPDATE → RESTART
# flow.
#
# Trigger: push a tag `vX.Y.Z` matching package.json "version" (e.g. v0.0.2).
# workflow_dispatch is provided for manual re-runs of a given ref.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      ref:
        description: Tag/ref to build (defaults to the triggering ref)
        required: false

permissions:
  contents: write # create the Release + upload assets on this repo

jobs:
  release-mac:
    # Apple silicon runner — matches the arm64 mac target in package.json build.
    runs-on: macos-14
    timeout-minutes: 60
    env:
      # Hoisted to job level so signing/notarization can gate on presence.
      # All optional — absent secrets ⇒ an unsigned build that still publishes.
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      CSC_LINK: ${{ secrets.CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}
          # Full history + tags so the changelog step can diff against the
          # previous tag.
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        # pnpm version comes from packageManager in package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20.18.3
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      # Skip notarization when Apple secrets aren't configured, so the build
      # still succeeds (just un-notarized) instead of failing hard.
      - name: Disable notarization (no Apple secrets)
        if: ${{ env.APPLE_ID == '' }}
        run: echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Build, sign, notarize & publish
        run: pnpm run release:mac
        env:
          # Public repo → the default token can create the Release here.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # CSC_* and APPLE_* inherited from job env (signing + notarize:true).

      # Set the release body to a changelog of commits since the previous tag
      # (excludes the version-bump commit). Runs only for real tag pushes.
      - name: Write release notes
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV="$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo '')"
          RANGE="${TAG}"
          [ -n "$PREV" ] && RANGE="${PREV}..${TAG}"
          CHANGES="$(git log --no-merges --invert-grep --grep='^release: v' --pretty='- %s' "$RANGE")"
          [ -z "$CHANGES" ] && CHANGES="- Maintenance release."
          {
            echo "## What's changed in ${TAG}"
            echo
            echo "$CHANGES"
            echo
            [ -n "$PREV" ] && echo "**Full changelog:** https://github.com/${GITHUB_REPOSITORY}/compare/${PREV}...${TAG}"
          } | gh release edit "$TAG" --notes-file -
